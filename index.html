<!DOCTYPE html>
<html>
<head>
	<title></title>
</head>
<body>

<div style="vertical-align:top">
	<video id="video" width="1000px" autoplay></video>
	<div>
		<input type="button" value="Begin Your Search"
			onclick="mySetTimeout(show_gyft, 4000);"
			style="width:1000px;height:80px;font-size:30px;" />
	</div>
	<style>
		body {paddding:0px;margin:0px;vertical-align: top}


		#video {float:left;}
		#the-gyft {
			float:left;
		 	position: absolute;
		    left:200px;
		    top:200px;
	    	z-index:300000;
	    	display:none;
		 }
	</style>



	<div id="the-gyft" style="display:none;">
		<img src="visagyftcard.png" />
	</div>

</div>

<script>

// Grab elements, create settings, etc.
var video = document.getElementById('video');

// Get access to the camera!
if(navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
    // Not adding `{ audio: true }` since we only want video now
    navigator.mediaDevices.getUserMedia({ video: true }).then(function(stream) {
        video.src = window.URL.createObjectURL(stream);
        video.play();
    });
}



function show_gyft() {
    document.getElementById("the-gyft").style.display = 'block';
}

mySetTimeout=function(f,t){
    var endTime=new Date().valueOf()+t;
    setTimeout(function(){
        var now=new Date().valueOf();
        if(now<endTime){
            mySetTimeout(f,endTime-now);
        }else{
            f();
        }
    },t);
};





</script>

</body>
</html>
